*{box-sizing:border-box;margin:0;padding:0}
body{background:#020b16;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d1829}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
@keyframes ping{75%,100%{transform:scale(2);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.pulse-ring{position:relative;display:inline-flex;width:10px;height:10px}
.pulse-ring::before{content:'';position:absolute;inset:0;border-radius:50%;opacity:.4;animation:ping 1.5s infinite}
.pulse-ring span{position:relative;border-radius:50%;width:10px;height:10px;display:block}
.spin{animation:spin 1s linear infinite}
.fade{animation:fadeIn .4s ease}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}
</style>

          ${icon} ${label}${id==='assistant'?'<span style="margin-left:auto;background:#6366f1;color:white;border-radius:8px;font-size:9px;padding:1px 5px;font-weight:700">AI</span>':''}

function statCard(value,label,sub,icon,accent,pulse){
  return `<div style="background:#0d1829;border:1px solid #1e293b;border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;flex:1;min-width:120px">
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${accent}"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:26px;font-weight:800;color:#f1f5f9;font-family:monospace;line-height:1.1">${value}</div>
        <div style="font-size:11px;color:#64748b;margin-top:3px">${label}</div>
        ${sub?`<div style="font-size:10px;color:${accent};margin-top:2px;font-weight:600">${sub}</div>`:''}
      </div>
      <div style="font-size:18px;opacity:.6">${icon}</div>
    </div>
    ${pulse?`<div style="position:absolute;bottom:10px;right:12px"><span style="display:inline-flex;position:relative;width:10px;height:10px"><span style="position:absolute;inset:0;border-radius:50%;background:${accent};opacity:.4;animation:ping 1.5s infinite"></span><span style="position:relative;border-radius:50%;width:10px;height:10px;background:${accent};display:block"></span></span></div>`:''}
  </div>`;
}

function matchBar(score){
  const c=score>=90?'#22c55e':score>=80?'#f59e0b':'#94a3b8';
  return `<div style="display:flex;align-items:center;gap:4px"><div style="width:44px;height:5px;background:#1e293b;border-radius:3px;overflow:hidden"><div style="width:${score}%;height:100%;background:${c};border-radius:3px"></div></div><span style="font-size:11px;font-weight:700;color:${c};font-family:monospace">${score}%</span></div>`;
}

function statusChip(status){
  const m={applied:{l:'Sent ✓',bg:'#052e16',c:'#22c55e',b:'#166534'},generating:{l:'⟳ Generating',bg:'#1c1400',c:'#f59e0b',b:'#854d0e'},pending:{l:'Pending',bg:'#0f172a',c:'#64748b',b:'#1e293b'}};
  const s=m[status]||m.pending;
  return `<span style="padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:${s.bg};color:${s.c};border:1px solid ${s.b};white-space:nowrap">${s.l}</span>`;
}

function platBadge(name){
  const c={LinkedIn:'#0077b5',Indeed:'#003A9B',Glassdoor:'#0caa41','Welcome to the Jungle':'#3cbc8d',APEC:'#e2001a','France Travail':'#1d418a'};
  return `<span style="font-size:9px;padding:2px 5px;border-radius:3px;background:#0f172a;color:${c[name]||'#94a3b8'};font-weight:600">${name}</span>`;
}

async function testKey(){
  const k = document.getElementById('keyInput')?.value||keyInput;
  keyInput = k;
  if(!k.startsWith('sk-ant-')){testResult='error';render();return;}
  testLoading=true;testResult=null;render();
  try{
    const r=await fetch('https://corsproxy.io/?url=https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:MODEL,max_tokens:10,messages:[{role:'user',content:'Hi'}]})});
    const d=await r.json();
    testResult=d.content?.[0]?.text?'ok':'error';
  }catch{testResult='error';}
  testLoading=false;render();
}

  jobs=jobs.map(j=>j.id===id?{...j,status:'applied'}:j);

function openCV(id){
  selectedJob=id;cvContent='';coverContent='';cvLoading=true;render();
  generateCV(id);

async function generateCV(id){
  const job=jobs.find(j=>j.id===id);
  try{
    const r=await fetch('https://corsproxy.io/?url=https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:MODEL,max_tokens:1000,messages:[{role:'user',content:`Generate ATS-optimized CV and cover letter for Victor Castro Medina.
PROFILE: 9 years PET packaging engineer (Envases Universales Mexico 2016-2025). Expert: PET design, industrialization, hotfill, rPET, eco-design, lightweighting, production line launch. Tools: SolidWorks, Keyshot. Education: Industrial Design UNAM + Stanford Design Thinking ME310. Location: Île-de-France. French: A2.
JOB: ${job.title} at ${job.company}, ${job.location}, ${job.salary}. ATS keywords: ${job.keywords.join(', ')}.
Reply ONLY with JSON (no markdown): {"cv":"optimized CV max 380 words","cover":"cover letter max 220 words for ${job.company}"}`}]})});
    const d=await r.json();
    const p=JSON.parse(d.content?.[0]?.text?.replace(/```json|```/g,'').trim()||'{}');
    cvContent=p.cv||'Error generating CV';
    coverContent=p.cover||'Error generating cover letter';
  }catch{cvContent='Connection error. Please check your API key.';coverContent='Connection error.';}
  cvLoading=false;render();
  setTimeout(()=>{document.getElementById('chatEnd')?.scrollIntoView({behavior:'smooth'});},100);
}

async function sendChat(){
  const inp=document.getElementById('chatInput');
  const msg=inp?.value?.trim();
  if(!msg||chatLoading) return;
  inp.value='';
  chatMessages.push({role:'user',content:msg});
  chatLoading=true;render();
  scrollChat();
  await callChatAPI(msg);
}

async function sendQuick(q){
  chatMessages.push({role:'user',content:q});

  const sys=`You are JobHunter AI, personal recruiter for Victor Castro Medina. PET Packaging/Mechanical Engineer, 9 years Envases Universales Mexico 2016-2025. Expertise: PET container design, hotfill, rPET, eco-design, lightweighting, production lines. Location: Île-de-France. Languages: Spanish (native), English (professional), French (A2). Education: Industrial Design UNAM + Stanford Design Thinking ME310. Target companies: L'Oréal, Danone, Nestlé, Amcor, ALPLA, Sidel. Be concise, specific, actionable. Respond in English.`;
  try{
    const r=await fetch('https://corsproxy.io/?url=https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:MODEL,max_tokens:700,system:sys,messages:chatMessages.map(m=>({role:m.role,content:m.content}))})});
    const d=await r.json();
    chatMessages.push({role:'assistant',content:d.content?.[0]?.text||'Error.'});
  }catch{chatMessages.push({role:'assistant',content:'⚠️ Connection error. Check your API key.'});}
  chatLoading=false;render();scrollChat();
}

function scrollChat(){
  setTimeout(()=>{document.getElementById('chatEnd')?.scrollIntoView({behavior:'smooth'});},100);
}

function copyText(){
  const text=cvTab==='cv'?cvContent:coverContent;
  navigator.clipboard.writeText(text).then(()=>alert('Copied to clipboard!'));
}

// ── BIND EVENTS ───────────────────────────────────────────────
function bindEvents(){
  const ki=document.getElementById('keyInput');
  if(ki){
    ki.addEventListener('input',e=>{keyInput=e.target.value;});
    ki.addEventListener('keydown',e=>{if(e.key==='Enter')enterApp();});
  }
}

// ── INIT ──────────────────────────────────────────────────────
render();
</script>
</body>
